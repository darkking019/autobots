version: "3.8"

services:
  mostqi-rpa:
    build: .
    container_name: mostqi-rpa
    ports:
      - "8000:8000"

    
    shm_size: 2gb                   
    mem_limit: 6g                    
    cpus: 4.0                        

    environment:
      - HEADLESS=true
      - MAX_CONTEXTS=6             
      - MAX_RETRIES=5
      - BASE_BACKOFF=3
      - TIMEOUT=60000
      - PYTHONUNBUFFERED=1
      - GOOGLE_CREDENTIALS=${GOOGLE_CREDENTIALS}
    volumes:
      - ./evidencia:/app/evidencia
      - ./logs:/app/logs

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s